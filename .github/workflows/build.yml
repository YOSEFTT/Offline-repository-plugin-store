name: Build & Release

# בכל פוש ל-main:
#   1. מקדם אוטומטית את גרסת הפאטצ' (1.0.1 -> 1.0.2)
#   2. בונה קובץ EXE נייד יחיד (Portable, ללא התקנה) - בנייה אחת בלבד
#   3. מבצע commit של הגרסה החדשה חזרה ל-main
#   4. יוצר Release אוטומטי ומצרף אליו את ה-EXE
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          version=$(npm version patch --no-git-tag-version)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "New version: ${version}"

      - name: Build portable EXE
        run: npm run dist:win-portable

      - name: Commit version bump back to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release with portable EXE
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.version }}" dist-build/*.exe \
            --target main \
            --title "${{ steps.bump.outputs.version }}" \
            --notes "בנייה אוטומטית — קובץ EXE נייד (Portable), אינו מצריך התקנה."
