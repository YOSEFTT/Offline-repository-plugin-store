name: Build & Release

# רץ אוטומטית בכל פוש (בדיקת בנייה + קובץ נייד להורדה),
# ובכל פרסום Release מקדם אוטומטית את גרסת התוכנה, בונה ומצרף EXE נייד יחיד.
on:
  push:
    branches:
      - '**'   # כל ענף (לא כולל תגים, כדי למנוע בנייה כפולה בעת יצירת Release)
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # בנייה בכל פוש: מוודא שהאפליקציה נבנית, ושומר EXE נייד כ-Artifact
  # ---------------------------------------------------------------
  ci-build:
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run dist:win-portable

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: otzaria-plugins-store-portable
          path: dist-build/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------
  # בפרסום Release: קידום פאטצ' אוטומטי -> בנייה -> צירוף EXE לרילס
  # ---------------------------------------------------------------
  release-build:
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          new_version=$(npm version patch --no-git-tag-version)
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${new_version}"

      - name: Build portable EXE
        run: npm run dist:win-portable

      - name: Commit version bump back to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main

      - name: Attach portable EXE to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist-build/*.exe --clobber
